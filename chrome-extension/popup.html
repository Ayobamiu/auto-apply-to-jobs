<!DOCTYPE html>
<html>

<head>
  <style>
    :root {
      --bg: #0b0e14;
      --bg-card: #151921;
      --text: #f1f5f9;
      --text-muted: #94a3b8;
      --accent: #3b82f6;
      --border: #262c3a;
      --radius: 10px;
    }

    body {
      width: 280px;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      margin: 0;
      padding: 16px;
    }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
    }

    .status-item {
      display: flex;
      align-items: center;
      margin-bottom: 12px;
      font-size: 13px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 10px;
      background: #4b5563;
    }

    .active {
      background: #10b981;
      box-shadow: 0 0 8px #10b981;
    }

    .error {
      background: #ef4444;
    }

    h2 {
      font-size: 14px;
      margin: 0 0 16px 0;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 10px;
      background: var(--accent);
      color: white;
      text-align: center;
      text-decoration: none;
      border-radius: 6px;
      font-weight: 600;
      font-size: 12px;
      border: none;
      margin-top: 8px;
    }
  </style>
</head>

<body>
  <div class="card">
    <h2>System Status</h2>

    <div class="status-item">
      <span class="status-dot" id="app-dot"></span>
      <span id="app-text">Checking App Login...</span>
    </div>

    <div class="status-item">
      <span class="status-dot" id="hs-dot"></span>
      <span id="hs-text">Handshake: Not Synced</span>
    </div>

    <a href="https://app.joinhandshake.com/login" target="_blank" class="btn">Open Handshake</a>
  </div>
  <script src="popup.js"></script>
</body>

</html>
